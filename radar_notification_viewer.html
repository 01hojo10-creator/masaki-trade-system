<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>相場レーダー通知ビューアー</title>
  <style>
    :root{
      color-scheme:dark;
      --bg:#0b1020;
      --panel:#111827;
      --panel2:#172033;
      --line:rgba(255,255,255,.12);
      --text:#e5edf8;
      --muted:#9fb0c8;
      --accent:#60a5fa;
      --good:#8cf0bf;
      --warn:#ffd54a;
      --bad:#ff9aaa;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    header{
      position:sticky;
      top:0;
      z-index:2;
      background:rgba(11,16,32,.94);
      border-bottom:1px solid var(--line);
      padding:12px 14px;
    }
    .head-inner{
      max-width:1180px;
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    h1{
      margin:0;
      font-size:18px;
      letter-spacing:0;
    }
    .controls{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }
    button,input{
      min-height:34px;
      border-radius:8px;
      border:1px solid var(--line);
      background:var(--panel2);
      color:var(--text);
      font-weight:800;
      padding:6px 10px;
    }
    button{ cursor:pointer; }
    button.active{
      border-color:rgba(96,165,250,.65);
      background:rgba(96,165,250,.18);
    }
    main{
      max-width:1180px;
      margin:0 auto;
      padding:14px;
    }
    .status{
      margin-bottom:12px;
      padding:10px;
      border:1px solid var(--line);
      border-radius:8px;
      background:var(--panel);
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
    }
    .summary{
      margin-bottom:12px;
      padding:12px;
      border:1px solid rgba(96,165,250,.25);
      border-radius:8px;
      background:rgba(96,165,250,.09);
      line-height:1.7;
      font-size:14px;
      font-weight:750;
    }
    .slot-tabs{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:8px;
      margin-bottom:12px;
    }
    .slot-tab{
      text-align:left;
      padding:10px;
    }
    .slot-tab span{
      display:block;
      margin-top:3px;
      color:var(--muted);
      font-size:11px;
      font-weight:700;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:10px;
    }
    .card{
      border:1px solid var(--line);
      border-radius:8px;
      background:var(--panel);
      padding:12px;
      min-height:120px;
    }
    .card h2{
      margin:0 0 8px;
      font-size:15px;
      letter-spacing:0;
    }
    .kv{
      display:grid;
      grid-template-columns:140px minmax(0, 1fr);
      gap:6px 10px;
      font-size:13px;
      line-height:1.5;
    }
    .k{ color:var(--muted); font-weight:800; }
    .v{ color:var(--text); min-width:0; overflow-wrap:anywhere; }
    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }
    .chip{
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      border-radius:999px;
      padding:3px 8px;
      font-size:12px;
      font-weight:800;
    }
    pre{
      margin:0;
      white-space:pre-wrap;
      word-break:break-word;
      font-family:ui-monospace,SFMono-Regular,Consolas,monospace;
      color:#dbeafe;
      font-size:12px;
      line-height:1.55;
    }
    a{ color:#93c5fd; }
    @media (max-width:720px){
      .head-inner{ align-items:flex-start; }
      .controls{ width:100%; }
      input{ flex:1; min-width:150px; }
      .slot-tabs{ grid-template-columns:repeat(2, minmax(0, 1fr)); }
      .grid{ grid-template-columns:1fr; }
      .kv{ grid-template-columns:1fr; }
      .k{ margin-top:6px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="head-inner">
      <h1>相場レーダー通知ビューアー</h1>
      <div class="controls">
        <button id="todayBtn" type="button">今日</button>
        <button id="yesterdayBtn" type="button">昨日</button>
        <input id="dateInput" type="date" aria-label="日付選択">
        <button id="loadBtn" type="button">表示</button>
      </div>
    </div>
  </header>
  <main>
    <div class="status" id="status">読み込み待ち</div>
    <div class="summary" id="dailySummary">日付を選択してください。</div>
    <div class="slot-tabs" id="slotTabs"></div>
    <section class="grid" id="contentGrid"></section>
  </main>
  <script>
    const SLOT_ORDER = [
      ["morning", "朝"],
      ["midday", "昼"],
      ["evening", "夕"],
      ["night", "夜"]
    ];
    let currentData = null;
    let activeSlot = "morning";

    function jstDateKey(date = new Date()){
      const jst = new Date(date.getTime() + 9 * 60 * 60 * 1000);
      return jst.toISOString().slice(0, 10);
    }

    function addDays(dateKey, days){
      const d = new Date(`${dateKey}T00:00:00+09:00`);
      d.setDate(d.getDate() + days);
      return jstDateKey(d);
    }

    function escapeHtml(value){
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function asList(value){
      return Array.isArray(value) ? value.filter(Boolean) : [];
    }

    function chips(items){
      const source = asList(items);
      if(!source.length) return '<span class="chip">---</span>';
      return `<div class="chips">${source.map(item => `<span class="chip">${escapeHtml(item)}</span>`).join("")}</div>`;
    }

    async function loadDate(dateKey){
      const path = `reports/radar-notifications-${dateKey}.json?cb=${Date.now()}`;
      const status = document.getElementById("status");
      status.textContent = `${path} を読み込み中`;
      try{
        const res = await fetch(path, { cache:"no-store" });
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        currentData = await res.json();
        activeSlot = SLOT_ORDER.find(([key]) => currentData?.reports?.[key])?.[0] || "morning";
        render();
        status.textContent = `${dateKey} の通知履歴を表示中`;
      }catch(err){
        currentData = null;
        render();
        status.textContent = `${dateKey} の通知履歴を取得できません: ${err.message}`;
      }
    }

    function render(){
      const summary = document.getElementById("dailySummary");
      const tabs = document.getElementById("slotTabs");
      const grid = document.getElementById("contentGrid");
      if(!currentData){
        summary.textContent = "通知履歴がありません。";
        tabs.innerHTML = "";
        grid.innerHTML = "";
        return;
      }
      summary.textContent = currentData.dailySummary || "日中の通知を時系列で確認できます。";
      const reports = currentData.reports || {};
      tabs.innerHTML = SLOT_ORDER.map(([key, label]) => {
        const item = reports[key];
        const countText = item ? `Focus ${item.focusCount || 0} / Watch ${item.watchCount || 0}` : "未生成";
        return `<button type="button" class="slot-tab ${activeSlot === key ? "active" : ""}" data-slot="${key}">${label}<span>${countText}</span></button>`;
      }).join("");
      tabs.querySelectorAll("[data-slot]").forEach(btn => {
        btn.addEventListener("click", () => {
          activeSlot = btn.dataset.slot;
          render();
        });
      });
      const item = reports[activeSlot];
      if(!item){
        grid.innerHTML = `<div class="card"><h2>${escapeHtml(SLOT_ORDER.find(([key]) => key === activeSlot)?.[1] || activeSlot)}</h2><p>この時間帯の通知はまだありません。</p></div>`;
        return;
      }
      const diagnostics = item.diagnostics || {};
      const dataStatus = item.dataStatus || {};
      grid.innerHTML = `
        <div class="card">
          <h2>通知概要</h2>
          <div class="kv">
            <div class="k">marketDate</div><div class="v">${escapeHtml(item.marketDate)}</div>
            <div class="k">generatedAt</div><div class="v">${escapeHtml(item.generatedAt)}</div>
            <div class="k">notificationType</div><div class="v">${escapeHtml(item.notificationType)} / ${escapeHtml(item.notificationLabel)}</div>
            <div class="k">runId</div><div class="v">${escapeHtml(item.runId || "---")}</div>
            <div class="k">地合い判断</div><div class="v">${escapeHtml(item.marketRegime || "---")}</div>
            <div class="k">Focus件数</div><div class="v">${escapeHtml(item.focusCount ?? 0)}</div>
            <div class="k">Watch件数</div><div class="v">${escapeHtml(item.watchCount ?? 0)}</div>
          </div>
        </div>
        <div class="card">
          <h2>短文通知</h2>
          <pre>${escapeHtml(item.shortNotificationText || "")}</pre>
        </div>
        <div class="card">
          <h2>ENTRY候補</h2>
          ${chips(item.entryCandidates)}
          <h2 style="margin-top:14px;">注目テーマ</h2>
          ${chips(item.themes)}
        </div>
        <div class="card">
          <h2>重要材料・注意点</h2>
          <div class="k">重要材料</div>
          ${chips(item.importantMaterials)}
          <div class="k" style="margin-top:10px;">注意点</div>
          ${chips(item.cautions)}
        </div>
        <div class="card">
          <h2>次の時間帯への引き継ぎ</h2>
          <div class="v">${escapeHtml(item.handoffToNextSession || "---")}</div>
        </div>
        <div class="card">
          <h2>データ取得状態</h2>
          <div class="kv">
            <div class="k">scanTarget</div><div class="v">${escapeHtml(dataStatus.scanTargetCount ?? "---")}</div>
            <div class="k">success / failed</div><div class="v">${escapeHtml(dataStatus.priceFetchSuccessCount ?? "---")} / ${escapeHtml(dataStatus.priceFetchFailedCount ?? "---")}</div>
            <div class="k">hourlyEvaluated</div><div class="v">${escapeHtml(dataStatus.hourlyEvaluatedCount ?? "---")}</div>
            <div class="k">scanOnly</div><div class="v">${escapeHtml(dataStatus.scanOnlyCount ?? "---")}</div>
            <div class="k">freshness</div><div class="v">${escapeHtml(dataStatus.dataFreshnessStatus || "---")}</div>
          </div>
        </div>
        <div class="card">
          <h2>前回通知からの変化</h2>
          <div class="kv">
            <div class="k">Watch重複率</div><div class="v">${escapeHtml(diagnostics.watchDiagnostics?.watchOverlapRate?.toFixed ? diagnostics.watchDiagnostics.watchOverlapRate.toFixed(1) + "%" : "---")}</div>
            <div class="k">新規Watch</div><div class="v">${escapeHtml(diagnostics.watchDiagnostics?.newWatchCount ?? "---")}</div>
            <div class="k">Focus昇格</div><div class="v">${escapeHtml(diagnostics.watchDiagnostics?.promotedToFocusCount ?? "---")}</div>
            <div class="k">停滞理由</div><div class="v">${escapeHtml(diagnostics.watchDiagnostics?.watchStagnationReason || "---")}</div>
          </div>
        </div>
        <div class="card">
          <h2>診断レポート</h2>
          <div class="v">${escapeHtml(diagnostics.workflowSummary || "---")}</div>
          <p><a href="chatgpt-radar-report.json" target="_blank" rel="noopener">chatgpt-radar-report.json</a></p>
          <p><a href="verification.json" target="_blank" rel="noopener">verification.json</a></p>
        </div>
      `;
    }

    document.getElementById("todayBtn").addEventListener("click", () => {
      const key = jstDateKey();
      document.getElementById("dateInput").value = key;
      loadDate(key);
    });
    document.getElementById("yesterdayBtn").addEventListener("click", () => {
      const key = addDays(jstDateKey(), -1);
      document.getElementById("dateInput").value = key;
      loadDate(key);
    });
    document.getElementById("loadBtn").addEventListener("click", () => {
      const key = document.getElementById("dateInput").value || jstDateKey();
      loadDate(key);
    });
    document.getElementById("dateInput").value = jstDateKey();
    loadDate(jstDateKey());
  </script>
</body>
</html>
