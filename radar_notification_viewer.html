<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
  <meta name="theme-color" content="#0b1020">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>相場レーダー通知ビューアー</title>
  <link rel="stylesheet" href="radar_notification_viewer.css?v=20260623-9">
</head>
<body>
  <header>
    <div class="head">
      <h1>相場レーダー通知ビューアー</h1>
      <div class="controls">
        <button id="todayBtn" type="button">今日</button>
        <button id="yesterdayBtn" type="button">昨日</button>
        <input id="dateInput" type="date" aria-label="日付選択">
        <button id="loadBtn" type="button">表示</button>
        <button id="refreshBtn" type="button" class="good">自動更新 60秒: ON</button>
      </div>
    </div>
  </header>
  <main>
    <div id="status" class="status">読み込み待ち</div>
    <div id="summary" class="summary">今日の通知を読み込みます。</div>
    <div id="tabs" class="tabs"></div>
    <section id="content" class="grid"></section>
  </main>
