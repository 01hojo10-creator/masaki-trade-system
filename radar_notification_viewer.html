<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>相場レーダー通知ビューアー</title>
  <link rel="stylesheet" href="radar_notification_viewer.css?v=20260622-1">
</head>
<body>
  <header>
    <div class="head-inner">
      <h1>相場レーダー通知ビューアー</h1>
      <div class="controls">
        <button id="todayBtn" type="button">今日</button>
        <button id="yesterdayBtn" type="button">昨日</button>
        <input id="dateInput" type="date" aria-label="日付選択">
        <button id="loadBtn" type="button">表示</button>
        <button id="autoRefreshBtn" type="button" class="good">自動更新 60秒: ON</button>
        <button id="notificationBtn" type="button">画面表示中通知</button>
      </div>
    </div>
  </header>
  <main>
    <div class="status" id="status">読み込み待ち</div>
    <div class="summary" id="dailySummary">日付を選択してください。</div>
    <div class="slot-tabs" id="slotTabs"></div>
    <section class="grid" id="contentGrid"></section>
  </main>
  <script src="radar_notification_viewer_lib.js?v=20260622-1"></script>
  <script src="radar_notification_viewer_app.js?v=20260622-1"></script>
</body>
</html>
