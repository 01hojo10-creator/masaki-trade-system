<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
  <meta name="theme-color" content="#0b1020">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>相場レーダー通知ビューアー</title>
  <style>
    :root{color-scheme:dark;--bg:#0b1020;--panel:#111827;--panel2:#172033;--line:rgba(255,255,255,.13);--text:#e5edf8;--muted:#9fb0c8;--accent:#60a5fa;--good:#8cf0bf;--warn:#ffd54a;--bad:#ff9aaa}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
    body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
    header{position:sticky;top:0;z-index:10;background:rgba(11,16,32,.97);border-bottom:1px solid var(--line);padding:10px 12px;padding-top:max(10px,env(safe-area-inset-top));backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
    .head{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    h1{margin:0;font-size:18px;line-height:1.25}
    .controls{display:flex;gap:7px;align-items:center;flex-wrap:wrap;width:auto}
    button,input{min-height:40px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--text);font-size:14px;font-weight:800;padding:8px 10px}
    button{cursor:pointer;touch-action:manipulation}
    button.active{border-color:rgba(96,165,250,.75);background:rgba(96,165,250,.20)}
    button.good{border-color:rgba(140,240,191,.50);color:var(--good);background:rgba(140,240,191,.10)}
    button.warn{border-color:rgba(255,213,74,.48);color:var(--warn);background:rgba(255,213,74,.10)}
    main{max-width:1180px;margin:0 auto;padding:12px;padding-bottom:max(24px,env(safe-area-inset-bottom))}
    .status,.summary,.card{border:1px solid var(--line);border-radius:10px;background:var(--panel)}
    .status{margin-bottom:10px;padding:10px 12px;color:var(--muted);font-size:13px;line-height:1.6;overflow-wrap:anywhere}
    .status.ok{border-color:rgba(140,240,191,.32)}
    .status.warning{border-color:rgba(255,213,74,.55);background:rgba(255,213,74,.08);color:var(--warn)}
    .status.error{border-color:rgba(255,154,170,.58);background:rgba(255,154,170,.08);color:var(--bad)}
    .status-top{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
    .badge{display:inline-flex;align-items:center;min-height:24px;padding:2px 8px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.05);font-size:11px;font-weight:800;max-width:100%;overflow-wrap:anywhere}
    .badge.good{color:var(--good);border-color:rgba(140,240,191,.35)}
    .badge.warn{color:var(--warn);border-color:rgba(255,213,74,.42)}
    .badge.bad{color:var(--bad);border-color:rgba(255,154,170,.45)}
    .summary{margin-bottom:10px;padding:12px;border-color:rgba(96,165,250,.28);background:rgba(96,165,250,.09);font-size:14px;font-weight:750;line-height:1.7;overflow-wrap:anywhere}
    .tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;margin-bottom:10px}
    .tab{text-align:left;min-width:0;padding:9px}
    .tab strong{display:block;font-size:14px}
    .tab span{display:block;margin-top:3px;color:var(--muted);font-size:10px;line-height:1.35;overflow-wrap:anywhere}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .card{padding:12px;min-width:0;overflow:hidden}
    .card.full{grid-column:1/-1}
    .card h2{margin:0 0 9px;font-size:15px}
    .card h3{margin:14px 0 7px;font-size:13px;color:var(--muted)}
    .kv{display:grid;grid-template-columns:135px minmax(0,1fr);gap:6px 10px;font-size:13px;line-height:1.5}
    .k{color:var(--muted);font-weight:800}
    .v{min-width:0;overflow-wrap:anywhere}
    .list{display:grid;gap:7px}
    .row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:start;padding:9px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.035);min-width:0}
    .row-main{font-weight:850;overflow-wrap:anywhere}
    .row-sub{margin-top:3px;color:var(--muted);font-size:12px;line-height:1.45;overflow-wrap:anywhere}
    .num{min-width:30px;text-align:center;padding:2px 7px;border:1px solid rgba(96,165,250,.36);border-radius:999px;color:#bfdbfe;font-size:12px;font-weight:900}
    .chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{max-width:100%;padding:4px 8px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.05);font-size:12px;font-weight:800;overflow-wrap:anywhere}
    pre{margin:0;white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;color:#dbeafe;font-size:12px;line-height:1.55}
    .muted{color:var(--muted)}
    a{color:#93c5fd}
    @media(max-width:760px){header{position:static}.head{display:block}h1{margin-bottom:9px;font-size:17px}.controls{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));width:100%}.controls input{grid-column:1/-1;width:100%;font-size:16px}.controls button{width:100%}main{padding:9px}.tabs{grid-template-columns:repeat(2,minmax(0,1fr))}.grid{grid-template-columns:1fr}.card.full{grid-column:auto}.kv{grid-template-columns:1fr;gap:2px}.k{margin-top:7px}.row{grid-template-columns:minmax(0,1fr) auto}}
    @media(max-width:380px){.controls{grid-template-columns:1fr}.controls input{grid-column:auto}.tabs{grid-template-columns:1fr 1fr}button,input{font-size:13px}}
  </style>
</head>
<body>
  <header><div class="head"><h1>相場レーダー通知ビューアー</h1><div class="controls"><button id="todayBtn" type="button">今日</button><button id="yesterdayBtn" type="button">昨日</button><input id="dateInput" type="date" aria-label="日付選択"><button id="loadBtn" type="button">表示</button><button id="refreshBtn" type="button" class="good">自動更新 60秒: ON</button></div></div></header>
  <main><div id="status" class="status">読み込み待ち</div><div id="summary" class="summary">今日の通知を読み込みます。</div><div id="tabs" class="tabs"></div><section id="content" class="grid"></section></main>
<script>
(function(){
  'use strict';
  var SLOT_ORDER=[['morning','朝'],['midday','昼'],['evening','夕'],['night','夜']];
  var AUTO_MS=60000,STALE_MINUTES=180,data=null,activeSlot='morning',currentDate='',autoOn=true,timer=null,loadedAt=null;
  function byId(id){return document.getElementById(id);}
  function esc(value){return String(value==null?'':value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
  function arr(value){return Object.prototype.toString.call(value)==='[object Array]'?value:[];}
  function dateObj(value){var d=value?new Date(value):null;return d&&!isNaN(d.getTime())?d:null;}
  function jstKey(date){var d=date||new Date(),j=new Date(d.getTime()+9*60*60*1000);return j.toISOString().slice(0,10);}
  function addDays(key,days){var d=new Date(key+'T00:00:00+09:00');d.setDate(d.getDate()+days);return jstKey(d);}
  function fmt(value){var d=dateObj(value);if(!d)return '---';try{return new Intl.DateTimeFormat('ja-JP',{timeZone:'Asia/Tokyo',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'}).format(d);}catch(e){return d.toLocaleString();}}
  function age(value){var d=dateObj(value);if(!d)return null;return Math.max(0,Math.floor((Date.now()-d.getTime())/60000));}
  function get(obj,path,def){var cur=obj;for(var i=0;i<path.length;i++){if(cur==null||typeof cur!=='object'||!(path[i] in cur))return def;cur=cur[path[i]];}return cur==null?def:cur;}
  function newestSlot(reports){var best='morning',bestTime=-1;for(var i=0;i<SLOT_ORDER.length;i++){var key=SLOT_ORDER[i][0],item=reports&&reports[key];if(item){var d=dateObj(item.generatedAt),t=d?d.getTime():i;if(t>bestTime){bestTime=t;best=key;}}}return best;}
  function slotLabel(key){for(var i=0;i<SLOT_ORDER.length;i++)if(SLOT_ORDER[i][0]===key)return SLOT_ORDER[i][1];return key;}
  function status(message,type,path){var el=byId('status'),reports=data&&data.reports?data.reports:{},newest=data?reports[newestSlot(reports)]:null,mins=newest?age(newest.generatedAt):null,stale=currentDate===jstKey()&&mins!==null&&mins>STALE_MINUTES,badges=[];if(path)badges.push('<span class="badge">読込先: '+esc(path)+'</span>');if(loadedAt)badges.push('<span class="badge good">最終確認: '+esc(fmt(loadedAt))+'</span>');if(newest&&newest.generatedAt)badges.push('<span class="badge '+(stale?'bad':'good')+'">最新通知: '+esc(fmt(newest.generatedAt))+(mins!==null?'（'+mins+'分前）':'')+'</span>');if(data&&data.updatedAt)badges.push('<span class="badge">JSON更新: '+esc(fmt(data.updatedAt))+'</span>');if(stale)badges.push('<span class="badge bad">データ鮮度警告</span>');el.className='status '+(stale&&type==='ok'?'warning':type);el.innerHTML='<div class="status-top"><strong>'+esc(message)+'</strong><span>'+(autoOn?'自動更新ON':'自動更新OFF')+'</span></div>'+(badges.length?'<div class="badges">'+badges.join('')+'</div>':'');}
  function chips(items){items=arr(items);if(!items.length)return '<span class="muted">---</span>';var out=[];for(var i=0;i<items.length;i++){var x=items[i],label;if(x&&typeof x==='object'){label=[x.symbol,x.name,x.severity,x.title||x.summary||x.reason].filter(function(v){return !!v;}).join(' | ');if(!label){try{label=JSON.stringify(x);}catch(e){label='---';}}}else label=x;out.push('<span class="chip">'+esc(label)+'</span>');}return '<div class="chips">'+out.join('')+'</div>';}
  function rows(items,empty){items=arr(items);if(!items.length)return '<p class="muted">'+esc(empty)+'</p>';var out=[];for(var i=0;i<items.length;i++){var x=items[i],main='',sub='';if(x&&typeof x==='object'){main=[x.symbol||x.code,x.name].filter(function(v){return !!v;}).join(' ');if(!main){try{main=JSON.stringify(x);}catch(e){main='---';}}var missing=arr(x.missingConditions).join(' / ');sub=[x.reason,x.signal,x.theme,missing].filter(function(v){return !!v;}).join('｜');}else main=x;out.push('<div class="row"><div><div class="row-main">'+esc(main)+'</div>'+(sub?'<div class="row-sub">'+esc(sub)+'</div>':'')+'</div><div class="num">'+(i+1)+'</div></div>');}return '<div class="list">'+out.join('')+'</div>';}
  function reasons(obj){if(!obj||typeof obj!=='object')return '<p class="muted">理由データはありません。</p>';var keys=Object.keys(obj);if(!keys.length)return '<p class="muted">理由データはありません。</p>';keys.sort(function(a,b){return Number(obj[b]||0)-Number(obj[a]||0);});var out=[];for(var i=0;i<keys.length;i++)out.push('<div class="row"><div class="row-main">'+esc(keys[i])+'</div><div class="num">'+esc(obj[keys[i]])+'</div></div>');return '<div class="list">'+out.join('')+'</div>';}
  function requestJson(url,ok,fail){var xhr=new XMLHttpRequest();xhr.open('GET',url,true);xhr.timeout=20000;xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;if(xhr.status>=200&&xhr.status<300){try{ok(JSON.parse(xhr.responseText));}catch(e){fail('JSON解析エラー: '+e.message);}}else fail('HTTP '+xhr.status);};xhr.onerror=function(){fail('通信エラー');};xhr.ontimeout=function(){fail('タイムアウト');};try{xhr.send();}catch(e){fail(e.message||'読込エラー');}}
  function load(key,preserve,quiet){currentDate=key;var path='reports/radar-notifications-'+key+'.json';if(!quiet)status(key+' を読み込み中','ok',path);requestJson(path+'?cb='+Date.now(),function(next){data=next||{};var reports=data.reports||{};if(!preserve||!reports[activeSlot])activeSlot=newestSlot(reports);loadedAt=new Date();render();status(key+' の通知履歴を表示中','ok',path);},function(message){data=null;render();status(key+' の通知履歴を取得できません: '+message,'error',path);});}
  function render(){var summary=byId('summary'),tabs=byId('tabs'),content=byId('content');if(!data){summary.textContent='通知履歴を読み込めませんでした。上のエラー内容と読込先を確認してください。';tabs.innerHTML='';content.innerHTML='';return;}summary.textContent=data.dailySummary||'最新時間帯を表示しています。';var reports=data.reports||{},tabHtml=[];for(var i=0;i<SLOT_ORDER.length;i++){var key=SLOT_ORDER[i][0],label=SLOT_ORDER[i][1],item=reports[key],sub=item?'Focus '+(item.focusCount||0)+' / Watch '+(item.watchCount||0)+' / '+fmt(item.generatedAt):'未生成';tabHtml.push('<button type="button" class="tab '+(activeSlot===key?'active':'')+'" data-slot="'+key+'"><strong>'+label+'</strong><span>'+esc(sub)+'</span></button>');}tabs.innerHTML=tabHtml.join('');var tabButtons=tabs.getElementsByTagName('button');for(var t=0;t<tabButtons.length;t++)tabButtons[t].onclick=function(){activeSlot=this.getAttribute('data-slot');render();status(currentDate+' の通知履歴を表示中','ok','reports/radar-notifications-'+currentDate+'.json');};var item=reports[activeSlot];if(!item){content.innerHTML='<div class="card"><h2>'+esc(slotLabel(activeSlot))+'</h2><p>この時間帯の通知はまだありません。</p></div>';return;}var diagnostics=item.diagnostics||{},dataStatus=item.dataStatus||{},entryDiag=get(diagnostics,['entryDiagnostics'],{}),focusDiag=get(diagnostics,['focusDiagnostics'],{}),watchDiag=get(diagnostics,['watchDiagnostics'],{}),entryNearby=get(entryDiag,['entryNearbySymbols'],[]),entryReason=get(entryDiag,['reasonCounts'],{}),focusReason=get(focusDiag,['reasonCounts'],{}),mins=age(item.generatedAt),stale=currentDate===jstKey()&&mins!==null&&mins>STALE_MINUTES;content.innerHTML='<div class="card"><h2>通知概要</h2><div class="kv"><div class="k">marketDate</div><div class="v">'+esc(item.marketDate||'---')+'</div><div class="k">generatedAt</div><div class="v">'+esc(fmt(item.generatedAt))+(mins!==null?'（'+mins+'分前）':'')+'</div><div class="k">データ鮮度</div><div class="v"><span class="badge '+(stale?'bad':'good')+'">'+(stale?'古い可能性あり':'確認済み')+'</span></div><div class="k">通知</div><div class="v">'+esc((item.notificationType||'---')+' / '+(item.notificationLabel||'---'))+'</div><div class="k">runId</div><div class="v">'+esc(item.runId||'---')+'</div><div class="k">地合い</div><div class="v">'+esc(item.marketRegime||'---')+'</div><div class="k">Focus</div><div class="v">'+esc(item.focusCount||0)+'件</div><div class="k">Watch</div><div class="v">'+esc(item.watchCount||0)+'件</div><div class="k">ENTRY</div><div class="v">'+arr(item.entryCandidates).length+'件</div></div></div><div class="card"><h2>短文通知</h2><pre>'+esc(item.shortNotificationText||'')+'</pre></div><div class="card"><h2>Focus銘柄</h2>'+rows(item.focusSymbols,'Focus銘柄はありません。')+'</div><div class="card"><h2>Watch銘柄</h2>'+rows(item.watchSymbols,'Watch銘柄はありません。')+'</div><div class="card"><h2>ENTRY候補</h2>'+rows(item.entryCandidates,'現時点でENTRY成立銘柄はありません。')+'<h3>ENTRY間近・不足条件</h3>'+rows(entryNearby,'ENTRY間近の銘柄情報はありません。')+'</div><div class="card"><h2>ENTRY不成立理由</h2>'+reasons(entryReason)+'<h3>Focus除外・不足理由</h3>'+reasons(focusReason)+'</div><div class="card"><h2>注目テーマ</h2>'+chips(item.themes)+'<h3>重要材料</h3>'+chips(item.importantMaterials)+'<h3>注意点</h3>'+chips(item.cautions)+'</div><div class="card"><h2>データ取得状態</h2><div class="kv"><div class="k">scanTarget</div><div class="v">'+esc(dataStatus.scanTargetCount==null?'---':dataStatus.scanTargetCount)+'</div><div class="k">success / failed</div><div class="v">'+esc(dataStatus.priceFetchSuccessCount==null?'---':dataStatus.priceFetchSuccessCount)+' / '+esc(dataStatus.priceFetchFailedCount==null?'---':dataStatus.priceFetchFailedCount)+'</div><div class="k">hourlyEvaluated</div><div class="v">'+esc(dataStatus.hourlyEvaluatedCount==null?'---':dataStatus.hourlyEvaluatedCount)+'</div><div class="k">scanOnly</div><div class="v">'+esc(dataStatus.scanOnlyCount==null?'---':dataStatus.scanOnlyCount)+'</div><div class="k">freshness</div><div class="v">'+esc(dataStatus.dataFreshnessStatus||'---')+'</div><div class="k">source generatedAt</div><div class="v">'+esc(fmt(dataStatus.generatedAt))+'</div></div></div><div class="card"><h2>前回通知からの変化</h2><div class="kv"><div class="k">Watch重複率</div><div class="v">'+esc(typeof watchDiag.watchOverlapRate==='number'?watchDiag.watchOverlapRate.toFixed(1)+'%':'---')+'</div><div class="k">新規Watch</div><div class="v">'+esc(watchDiag.newWatchCount==null?'---':watchDiag.newWatchCount)+'</div><div class="k">Focus昇格</div><div class="v">'+esc(watchDiag.promotedToFocusCount==null?'---':watchDiag.promotedToFocusCount)+'</div><div class="k">停滞理由</div><div class="v">'+esc(watchDiag.watchStagnationReason||'---')+'</div></div></div><div class="card full"><h2>次の時間帯への引き継ぎ</h2><div class="v">'+esc(item.handoffToNextSession||'---')+'</div></div>';}
  function setAuto(on){autoOn=on;var btn=byId('refreshBtn');btn.textContent='自動更新 60秒: '+(on?'ON':'OFF');btn.className=on?'good':'warn';if(timer){clearInterval(timer);timer=null;}if(on)timer=setInterval(function(){var key=byId('dateInput').value||jstKey();load(key,true,true);},AUTO_MS);if(currentDate)status(currentDate+' の通知履歴を表示中',data?'ok':'error','reports/radar-notifications-'+currentDate+'.json');}
  byId('todayBtn').onclick=function(){var key=jstKey();byId('dateInput').value=key;load(key,false,false);};
  byId('yesterdayBtn').onclick=function(){var key=addDays(jstKey(),-1);byId('dateInput').value=key;load(key,false,false);};
  byId('loadBtn').onclick=function(){var key=byId('dateInput').value||jstKey();load(key,false,false);};
  byId('refreshBtn').onclick=function(){setAuto(!autoOn);};
  var initial=jstKey();byId('dateInput').value=initial;setAuto(true);load(initial,false,false);
})();
</script>
</body>
</html>
