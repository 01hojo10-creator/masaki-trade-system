<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Masaki Trade System</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#111a2a;
      --panel2:#0f1726;
      --line:rgba(255,255,255,.10);
      --text:#e8eefc;
      --muted:#9fb0d1;
      --good:#19c37d;
      --bad:#ff5d73;
      --warn:#f5b942;
      --blue:#4ea1ff;
      --chip:#1a2640;
      --shadow:0 8px 24px rgba(0,0,0,.25);
      --radius:14px;
      --gold:#ffd54a;
      --gold-soft:rgba(255,213,74,.16);
      --green:#19c37d;
      --blue2:#4ea1ff;
      --gray:#cbd5e1;
      --red:#ff5d73;
      --signal-row:rgba(78,161,255,.20);
      --signal-row-strong:rgba(78,161,255,.14);
      --focus-head:#4a3716;
      --watch-head:#133c3a;
      --pool-head:#163453;

      --focus-card-top:#0f1a2e;
      --watch-card-top:#0f1a2e;
      --pool-card-top:#0f1a2e;
      --card-bottom-navy:#0f1a2e;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow-x:hidden;
    }

    .mobile-scroll-shell{
      width:100%;
      min-height:100vh;
    }

    .mobile-scroll-track{
      width:100%;
      min-width:100%;
    }

    .wrap{
      max-width:1900px;
      margin:0 auto;
      padding:10px 14px;
    }

    .header-panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:8px 12px;
      margin-bottom:10px;
      overflow:hidden;
    }

    .header-inline{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      min-width:0;
    }

    .title{
      flex:0 0 auto;
      font-size:24px;
      font-weight:800;
      letter-spacing:.2px;
      line-height:1;
      white-space:nowrap;
    }

    .controls{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:10px;
      flex-wrap:nowrap;
      min-width:0;
      flex:1 1 auto;
    }

    input[type="text"]{
      background:#0c1422;
      color:var(--text);
      border:1px solid var(--line);
      border-radius:10px;
      padding:8px 12px;
      min-width:0;
      outline:none;
    }

    #symbolsInput{
      flex:0 0 100px;
      width:100px;
      text-align:center;
      font-weight:800;
      letter-spacing:.4px;
    }

    #searchInput{
      flex:0 0 180px;
      width:180px;
      font-weight:700;
    }

    .motto-bar{
      flex:0 1 320px;
      min-width:180px;
      padding:0;
      font-size:17px;
      color:#ffe9b2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-weight:900;
      background:transparent;
      border:none;
      border-radius:0;
    }

    .motto-label{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin-right:8px;
      padding:3px 10px;
      border:1px solid rgba(255,213,74,.30);
      border-radius:999px;
      background:rgba(255,213,74,.12);
      color:#ffe9b2;
      font-size:16px;
      font-weight:900;
      line-height:1.1;
      vertical-align:middle;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
    }

    .motto-text{
      color:#ffe9b2;
      vertical-align:middle;
      font-size:17px;
      font-weight:900;
      line-height:1.1;
    }

    .auto-loading-bar{
      display:none;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      padding:10px 14px;
      border:1px solid rgba(255,213,74,.22);
      border-radius:14px;
      background:linear-gradient(180deg, rgba(255,213,74,.10), rgba(15,23,38,.96));
      color:#ffe9b2;
      box-shadow:0 8px 20px rgba(0,0,0,.20);
    }

    .auto-loading-bar.active{
      display:flex;
    }

    .auto-loading-dot{
      width:12px;
      height:12px;
      border-radius:999px;
      background:#ffd54a;
      box-shadow:0 0 8px rgba(255,213,74,.55);
      animation:autoPulse 1.2s ease-in-out infinite;
      flex:0 0 auto;
    }

    .auto-loading-text{
      font-size:14px;
      font-weight:900;
      letter-spacing:.2px;
      color:#ffe9b2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    @keyframes autoPulse{
      0%,100%{
        opacity:.55;
        transform:scale(.92);
        box-shadow:0 0 6px rgba(255,213,74,.35);
      }
      50%{
        opacity:1;
        transform:scale(1.08);
        box-shadow:0 0 12px rgba(255,213,74,.65);
      }
    }

    .top-grid{
      display:flex;
      flex-direction:column;
      gap:14px;
      align-items:stretch;
      margin-bottom:14px;
      height:auto;
      min-height:0;
    }

    .bottom-grid{
      display:block;
    }

    .section{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      min-width:0;
      display:flex;
      flex-direction:column;
    }

    .section + .section{
      margin-top:0;
    }

    .top-grid > .section{
      height:auto;
      min-height:0;
    }

    .section-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      padding:10px 14px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,#12203a,#0f1a2e);
      flex:0 0 auto;
    }

    .section-title{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .section-title h2{
      margin:0;
      font-size:18px;
    }

    .badge{
      border:1px solid var(--line);
      background:#0d1626;
      border-radius:999px;
      padding:5px 10px;
      font-size:12px;
      color:#d7e2ff;
    }

    .tablewrap{
      overflow-x:auto;
      overflow-y:visible;
      max-height:none;
      flex:1 1 auto;
      min-height:0;
      background:#06080d;
      scrollbar-width:none;
      -ms-overflow-style:none;
    }

    .tablewrap::-webkit-scrollbar{
      width:0;
      height:0;
    }

    .top-grid .tablewrap{
      min-height:0;
      max-height:none;
    }

    .focus-section .tablewrap,
    .watch-section .tablewrap,
    .pool-section .tablewrap{
      overflow-x:auto;
      overflow-y:visible;
      scrollbar-width:none;
      -ms-overflow-style:none;
    }

    .focus-section .tablewrap::-webkit-scrollbar,
    .watch-section .tablewrap::-webkit-scrollbar,
    .pool-section .tablewrap::-webkit-scrollbar{
      width:0;
      height:0;
    }

    table{
      width:max-content;
      min-width:100%;
      border-collapse:separate;
      border-spacing:0 8px;
      background:#06080d;
      table-layout:fixed;
    }

    th,td{
      border-bottom:1px solid var(--line);
      padding:9px 8px;
      font-size:12px;
      text-align:center;
      white-space:nowrap;
      vertical-align:middle;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    th{
      position:sticky;
      top:0;
      z-index:3;
      color:#dfe8ff;
      font-size:12px;
      letter-spacing:.3px;
      background:#13203a;
      background-clip:padding-box;
    }

    .price{font-weight:800;font-size:13px}
    .up{color:var(--good);font-weight:800}
    .down{color:var(--bad);font-weight:800}
    .flat{color:#cbd5e1;font-weight:700}
    .muted{color:var(--muted)}
    .small{font-size:11px}
    .err{color:#ff9baa;font-weight:700}

    .chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:24px;
      padding:4px 10px;
      border-radius:999px;
      background:#1a2640;
      border:1px solid var(--line);
      font-weight:800;
      font-size:11px;
      max-width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .trend-up{color:#8cf0bf;border-color:rgba(25,195,125,.35);background:rgba(25,195,125,.10)}
    .trend-down{color:#ff9baa;border-color:rgba(255,93,115,.35);background:rgba(255,93,115,.10)}
    .trend-range{color:#d1d9e8}
    .trigger-long{color:#8cf0bf;border-color:rgba(25,195,125,.35);background:rgba(25,195,125,.10)}
    .trigger-short{color:#ff9baa;border-color:rgba(255,93,115,.35);background:rgba(255,93,115,.10)}
    .trigger-pull{color:#9fd0ff;border-color:rgba(78,161,255,.35);background:rgba(78,161,255,.10)}
    .trigger-wait{color:#d1d9e8}

    .trend-entry-up{
      box-shadow:
        0 0 6px rgba(25,195,125,.55),
        0 0 12px rgba(25,195,125,.45),
        inset 0 0 4px rgba(25,195,125,.20);
    }

    .trend-entry-down{
      box-shadow:
        0 0 6px rgba(255,93,115,.55),
        0 0 12px rgba(255,93,115,.45),
        inset 0 0 4px rgba(255,93,115,.20);
    }

    .score{
      font-weight:900;
      padding:4px 10px;
      border-radius:8px;
      display:inline-block;
      min-width:52px;
      font-size:11px;
    }

    .score-gold{background:rgba(255,213,74,.16);color:#ffd54a}
    .score-green{background:rgba(25,195,125,.16);color:#8cf0bf}
    .score-blue{background:rgba(78,161,255,.16);color:#9fd0ff}
    .score-gray{background:rgba(203,213,225,.12);color:#dbe5f2}

    .entrybox,.rrbox{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:2px;
      width:100%;
      min-height:40px;
      padding:5px 6px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.12);
      background:#0d1626;
      line-height:1.1;
    }

    .entry-main,.rr-main{
      font-size:12px;
      font-weight:900;
      color:#f7fbff;
    }

    .entry-sub,.rr-sub{
      font-size:10px;
      font-weight:800;
    }

    .entry-heat-mid{
      background:linear-gradient(180deg, rgba(255,215,0,.35), rgba(255,215,0,.12));
      border:1px solid rgba(255,215,0,.55);
      box-shadow:
        0 0 6px rgba(255,215,0,.45),
        0 0 12px rgba(255,215,0,.35),
        inset 0 0 6px rgba(255,215,0,.15);
      animation:entryGlow 2.2s ease-in-out infinite;
    }

    .entry-heat-mid .entry-main{
      color:#fff9d6;
      text-shadow:0 0 6px rgba(255,215,0,.45);
    }

    .entry-heat-mid .entry-sub{
      color:#ffe9a6;
      text-shadow:0 0 4px rgba(255,215,0,.28);
    }

    @keyframes entryGlow{
      0%,100%{
        box-shadow:
          0 0 6px rgba(255,215,0,.45),
          0 0 12px rgba(255,215,0,.35),
          inset 0 0 6px rgba(255,215,0,.15);
      }
      50%{
        box-shadow:
          0 0 10px rgba(255,215,0,.58),
          0 0 18px rgba(255,215,0,.44),
          inset 0 0 8px rgba(255,215,0,.20);
      }
    }

    .section-foot{
      display:flex;
      gap:10px;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      padding:10px 12px;
      border-top:1px solid var(--line);
      background:var(--panel2);
      min-height:54px;
      flex:0 0 auto;
    }

    .summary{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:flex-start;
    }

    .mini{
      background:#0d1626;
      border:1px solid var(--line);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      color:#d7e2ff;
    }

    .focus-summary-stack{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }

    .focus-summary-row{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      min-width:0;
    }

    .theme-detect-block{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
      flex:1 1 100%;
    }

    .theme-detect-head{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      align-self:flex-start;
      min-height:28px;
      padding:6px 12px;
      border-radius:999px;
      border:1px solid rgba(245,185,66,.26);
      background:rgba(245,185,66,.10);
      color:#ffe9b2;
      font-size:12px;
      font-weight:900;
      line-height:1;
      white-space:nowrap;
    }

    .theme-detect-tags{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      min-width:0;
    }

    .theme-detect-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:26px;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid rgba(245,185,66,.26);
      background:rgba(245,185,66,.10);
      color:#ffe9b2;
      font-size:12px;
      font-weight:800;
      line-height:1.1;
      white-space:nowrap;
    }

    .focus-rank{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:28px;
      height:28px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      color:#fff4d6;
      background:rgba(245,185,66,.16);
      border:1px solid rgba(245,185,66,.34);
      box-shadow:0 0 10px rgba(245,185,66,.10);
      flex:0 0 auto;
    }

    .focus-headband{
      display:grid;
      grid-template-columns:28px 22px 56px minmax(0,1fr) auto;
      align-items:center;
      gap:8px;
      width:100%;
      min-width:0;
      padding:8px 10px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(180deg, rgba(245,185,66,.18), rgba(74,55,22,.96));
    }

    .focus-meta-stack{
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:0;
    }

    .focus-theme-block{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }

    .focus-theme-label{
      display:inline-flex;
      align-items:center;
      align-self:flex-start;
      min-height:24px;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid rgba(245,185,66,.26);
      background:rgba(245,185,66,.10);
      color:#ffe9b2;
      font-size:11px;
      font-weight:900;
      line-height:1;
      white-space:nowrap;
    }

    .focus-theme-tags{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      min-width:0;
    }

    .focus-mini-row{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .focus-mini-strong{
      background:rgba(255,213,74,.16);
      color:#ffd54a;
      border:1px solid rgba(255,213,74,.24);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:900;
    }

    .focus-mini-soft{
      background:#0d1626;
      color:#d7e2ff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:800;
    }

    .focus-comment-block{
      padding-top:8px;
      border-top:1px solid rgba(255,255,255,.08);
    }

    .focus-section{
      border:2px solid rgba(245,185,66,.52);
      box-shadow:0 10px 28px rgba(0,0,0,.28),0 0 0 1px rgba(245,185,66,.14) inset,0 0 18px rgba(245,185,66,.10);
    }
    .focus-section .section-head{
      background:linear-gradient(180deg, rgba(245,185,66,.24), rgba(40,28,10,.95));
      border-bottom:1px solid rgba(245,185,66,.18);
    }
    .focus-section .section-title h2{
      color:#fff4d6;
      text-shadow:0 0 10px rgba(245,185,66,.18);
    }
    .focus-section .badge{
      border-color:rgba(245,185,66,.34);
      background:rgba(245,185,66,.16);
      color:#ffe9b2;
      box-shadow:0 0 0 1px rgba(245,185,66,.05) inset;
    }
    .focus-section th{
      background:var(--focus-head);
      box-shadow:inset 0 -1px 0 rgba(245,185,66,.12);
    }
    .focus-section .section-foot{
      background:linear-gradient(180deg, rgba(245,185,66,.09), rgba(15,23,38,.98));
      border-top:2px solid rgba(245,185,66,.18);
    }

    .watch-section{
      border-color:rgba(25,195,125,.26);
      box-shadow:0 8px 24px rgba(0,0,0,.25),0 0 0 1px rgba(25,195,125,.05) inset;
    }
    .watch-section .section-head{
      background:linear-gradient(180deg, rgba(25,195,125,.12), rgba(15,26,46,.95));
      border-bottom-color:rgba(25,195,125,.16);
    }
    .watch-section .section-title h2{ color:#d8ffec; }
    .watch-section .badge{
      border-color:rgba(25,195,125,.24);
      background:rgba(25,195,125,.10);
      color:#bdf5d9;
    }
    .watch-section th{ background:var(--watch-head); }
    .watch-section .section-foot{
      background:linear-gradient(180deg, rgba(25,195,125,.05), rgba(15,23,38,.98));
      border-top-color:rgba(25,195,125,.18);
    }

    .pool-section{
      border-color:rgba(47,129,247,.24);
      box-shadow:0 8px 24px rgba(0,0,0,.25),0 0 0 1px rgba(47,129,247,.05) inset;
    }
    .pool-section .section-head{
      background:linear-gradient(180deg, rgba(47,129,247,.18), rgba(15,26,46,.95));
      border-bottom-color:rgba(47,129,247,.20);
    }
    .pool-section .section-title h2{ color:#dceaff; }
    .pool-section .badge{
      border-color:rgba(47,129,247,.24);
      background:rgba(47,129,247,.10);
      color:#cfe3ff;
    }
    .pool-section th{ background:var(--pool-head); }
    .pool-section .section-foot{
      background:linear-gradient(180deg, rgba(47,129,247,.05), rgba(15,23,38,.98));
      border-top-color:rgba(47,129,247,.18);
    }

    .subrow td{
      background:var(--card-bottom-navy);
      border-bottom:1px solid rgba(255,255,255,.08);
      padding:7px 10px;
      text-align:left;
      white-space:normal;
      overflow:visible;
      text-overflow:unset;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        inset 0 -1px 0 rgba(0,0,0,.20),
        0 8px 16px rgba(0,0,0,.22);
    }

    .focus-subrow td{ background:var(--card-bottom-navy); }
    .watch-subrow td{ background:var(--card-bottom-navy); }
    .pool-subrow td{ background:var(--card-bottom-navy); }

    .signal-row td{ background:var(--signal-row); }
    .signal-subrow td{ background:var(--signal-row-strong) !important; }

    .meta-grid{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
      flex-wrap:nowrap;
    }

    .meta-cell{
      min-width:0;
      flex:0 0 auto;
    }

    .meta-grid .meta-cell:first-child{
      min-width:0;
      flex:0 1 auto;
    }

    .meta-grid .meta-cell:last-child{
      min-width:0;
      flex:0 0 320px;
      display:flex;
      justify-content:flex-start;
      margin-left:auto;
    }

    .watch-section .watch-subrow .meta-grid .meta-cell:last-child{
      min-width:0;
      flex:0 0 220px;
      display:flex;
      justify-content:flex-start;
      margin-left:auto;
      padding-left:48px;
    }

    .meta-label{
      display:none;
    }

    .theme-pill{
      display:inline-flex;
      align-items:center;
      max-width:100%;
      min-height:24px;
      padding:3px 10px;
      border-radius:999px;
      border:1px solid rgba(245,185,66,.26);
      background:rgba(245,185,66,.10);
      color:#ffe9b2;
      font-size:11px;
      font-weight:800;
      line-height:1.2;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      vertical-align:middle;
    }

    .meta-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:26px;
      width:84px;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#0d1626;
      color:#dfe8ff;
      text-decoration:none;
      font-size:12px;
      font-weight:800;
      line-height:1;
      flex:0 0 auto;
    }

    .meta-link:hover{ filter:brightness(1.08); }
    .meta-link-news{
      color:#cfe3ff;
      background:rgba(47,129,247,.10);
      border-color:rgba(47,129,247,.22);
    }
    .meta-link-tv{
      color:#bdf5d9;
      background:rgba(25,195,125,.10);
      border-color:rgba(25,195,125,.22);
    }

    .comment-text{
      display:inline-flex;
      align-items:center;
      justify-content:flex-start;
      min-height:26px;
      width:100%;
      padding-left:0;

    function CORS_PROXY_URL(url){ return CORS_PROXY + encodeURIComponent(url); }

    async function fetchJsonWithRetry(url, options={}, retryCount=0){
      try{
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);
        const res = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(timeoutId);
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      }catch(e){
        if(retryCount < MAX_RETRY){
          const delay = RETRY_BASE_DELAY * (retryCount+1);
          await new Promise(r=>setTimeout(r, delay));
          return fetchJsonWithRetry(url, options, retryCount+1);
        }
        throw e;
      }
    }

   async function fetchChart(symbol, range, interval){
  try{
    const ticker = symbol.includes(".") ? symbol : symbol + ".T";
    const url = CORS_PROXY_URL(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=${range}&interval=${interval}`);
    const data = await fetchJsonWithRetry(url);
    const res = data?.chart?.result?.[0];
    if(!res?.indicators?.quote?.[0]?.close) return null;

    const q = res.indicators.quote[0];
    const adj = res.indicators.adjclose?.[0]?.adjclose || q.close;
    const meta = res.meta;

    const closes = q.close.map((v, i) => {
      if(v === null) return i > 0 ? q.close[i - 1] : null;
      return v;
    }).filter(v => v !== null);

    if(!closes.length) return null;

    return { closes, meta, adjCloses: adj };
  }catch(e){
    console.warn("fetchChart error", symbol, range, interval, e);
    return null;
  }
}

    function calcHMA(data, period){
      if(!data || data.length < period) return null;
      const half = Math.floor(period/2);
      const sqrt = Math.floor(Math.sqrt(period));
      const wma1 = calcWMA(data, half);
      const wma2 = calcWMA(data, period);
      const diff = wma1.map((v,i) => v*2 - wma2[i]);
      return calcWMA(diff, sqrt);
    }

    function calcWMA(data, period){
      const res = [];
      const weightSum = (period*(period+1))/2;
      for(let i=0; i<data.length; i++){
        if(i < period-1){ res.push(null); continue; }
        let sum = 0;
        for(let j=0; j<period; j++) sum += data[i-j]*(period-j);
        res.push(sum/weightSum);
      }
      return res;
    }

    async function analyzeScan(symbol){
      const [d1, h1, m15] = await Promise.all([
        fetchChart(symbol, "1mo", "1d"),
        fetchChart(symbol, "5d", "1h"),
        fetchChart(symbol, "2d", "15m")
      ]);
      if(!d1) return null;
      const price = d1.meta.regularMarketPrice;
      const prev = d1.meta.previousClose;
      const hmaD = calcHMA(d1.closes, 9);
      const hmaH = h1 ? calcHMA(h1.closes, 9) : null;
      const hmaM = m15 ? calcHMA(m15.closes, 9) : null;
      const score = (hmaD?.at(-1) > hmaD?.at(-2) ? 40:0) + (hmaH?.at(-1) > hmaH?.at(-2) ? 30:0) + (hmaM?.at(-1) > hmaM?.at(-2) ? 10:0);
      return { symbol, price, prev, score, hmaD, hmaH, hmaM };
    }

   async function analyzeFocus(symbol){
  const [h4, h1, m5] = await Promise.all([
    fetchChart(symbol, "1mo", "4h"),
    fetchChart(symbol, "5d", "1h"),
    fetchChart(symbol, "1d", "5m")
  ]);

  if(!m5) return null;

  const price = m5.meta?.regularMarketPrice ?? null;
  const hma4 = h4?.closes ? calcHMA(h4.closes, 9) : null;
  const hma1 = h1?.closes ? calcHMA(h1.closes, 9) : null;
  const hma5 = m5?.closes ? calcHMA(m5.closes, 9) : null;

  const decision = buildScanDecision(price, hma4, hma1, hma5);
  return { symbol, price, hma4, hma1, hma5, decision, isFallback:false };
}

        async function analyzeWatch(symbol){
      const [d1, h1] = await Promise.all([
        fetchChart(symbol, "3mo", "1d"),
        fetchChart(symbol, "5d", "1h")
      ]);
      if(!d1) return null;
      const price = d1.meta.regularMarketPrice;
      const prev = d1.meta.previousClose;
      const hmaD = calcHMA(d1.closes, 9);
      const hmaH = h1 ? calcHMA(h1.closes, 9) : null;
      const trend =
        hmaD?.at(-1) > hmaD?.at(-2) && hmaH?.at(-1) > hmaH?.at(-2) ? "上昇" :
        hmaD?.at(-1) < hmaD?.at(-2) && hmaH?.at(-1) < hmaH?.at(-2) ? "下降" :
        "レンジ";

      const score =
        (hmaD?.at(-1) > hmaD?.at(-2) ? 35 : 0) +
        (hmaH?.at(-1) > hmaH?.at(-2) ? 25 : 0) +
        (price > (hmaD?.at(-1) || price) ? 15 : 0) +
        (price > prev ? 10 : 0);

      const volume = d1.meta.regularMarketVolume || 0;
      const changePct = prev ? ((price - prev) / prev) * 100 : 0;

      return {
        symbol,
        price,
        prev,
        score,
        trend,
        volume,
        changePct,
        themes: getThemes(symbol),
        newsUrl: buildYahooNewsUrl(symbol),
        chartUrl: buildTradingViewUrl(symbol),
        isFallback:false
      };
    }

    async function analyzePool(symbol){
      const d1 = await fetchChart(symbol, "3mo", "1d");
      if(!d1) return null;
      const price = d1.meta.regularMarketPrice;
      const prev = d1.meta.previousClose;
      const changePct = prev ? ((price - prev) / prev) * 100 : 0;
      return {
        symbol,
        price,
        prev,
        changePct,
        themes: getThemes(symbol),
        newsUrl: buildYahooNewsUrl(symbol),
        chartUrl: buildTradingViewUrl(symbol),
        isFallback:false
      };
    }

    function buildScanDecision(price, hma4, hma1, hma5){
      const h4Now = hma4?.at(-1) ?? null;
      const h4Prev = hma4?.at(-2) ?? null;
      const h1Now = hma1?.at(-1) ?? null;
      const h1Prev = hma1?.at(-2) ?? null;
      const h5Now = hma5?.at(-1) ?? null;
      const h5Prev = hma5?.at(-2) ?? null;

      const trendUp = isFinite(h4Now) && isFinite(h4Prev) && isFinite(h1Now) && isFinite(h1Prev) && h4Now > h4Prev && h1Now > h1Prev;
      const trendDown = isFinite(h4Now) && isFinite(h4Prev) && isFinite(h1Now) && isFinite(h1Prev) && h4Now < h4Prev && h1Now < h1Prev;
      const triggerLong = trendUp && isFinite(h5Now) && isFinite(h5Prev) && h5Now > h5Prev && price >= h5Now;
      const triggerShort = trendDown && isFinite(h5Now) && isFinite(h5Prev) && h5Now < h5Prev && price <= h5Now;

      const trend = trendUp ? "上昇" : trendDown ? "下降" : "レンジ";
      const trigger = triggerLong ? "ロング" : triggerShort ? "ショート" : (Math.abs(price - (h5Now || price)) / Math.max(price || 1, 1) <= 0.003 ? "押し目待ち" : "待機");

      const ref = isFinite(h5Now) ? h5Now : price;
      const entryLow = ref * (1 - ENTRY_BAND_RATE);
      const entryHigh = ref * (1 + ENTRY_BAND_RATE);
      const sl = trendUp ? ref * 0.985 : trendDown ? ref * 1.015 : ref * 0.988;
      const tp = trendUp ? ref * 1.03 : trendDown ? ref * 0.97 : ref * 1.015;

      const score =
        (trendUp ? 35 : 0) +
        (triggerLong ? 20 : 0) +
        (price > (h1Now || price) ? 10 : 0) +
        (price > (h4Now || price) ? 10 : 0) +
        (Math.abs(price - ref) / Math.max(price || 1, 1) <= SIGNAL_ENTRY_DISTANCE_MAX ? 10 : 0) +
        (((tp - price) / Math.max(price || 1, 1)) >= SIGNAL_UPSIDE_ROOM_MIN ? 10 : 0) +
        (((price - sl) / Math.max(price || 1, 1)) <= SIGNAL_RISK_WIDTH_MAX ? 5 : 0);

      const entrySide = triggerLong ? "ENTRY" : triggerShort ? "SHORT" : "WAIT";
      const comment = triggerLong
        ? pickRandom(ENTRY_COMMENTS)
        : triggerShort
          ? "下落波動継続"
          : pickRandom(WAIT_COMMENTS);

      const isSignal =
        score >= SIGNAL_SCORE_MIN &&
        Math.abs(price - ref) / Math.max(price || 1, 1) <= SIGNAL_ENTRY_DISTANCE_MAX &&
        ((tp - price) / Math.max(price || 1, 1)) >= (trendDown ? -999 : SIGNAL_UPSIDE_ROOM_MIN) &&
        ((price - sl) / Math.max(price || 1, 1)) <= SIGNAL_RISK_WIDTH_MAX &&
        (triggerLong || triggerShort);

      return {
        trend,
        trigger,
        score,
        isSignal,
        entrySide,
        entryLow,
        entryHigh,
        sl,
        tp,
        comment,
        trendClass: trendUp ? "trend-up" : trendDown ? "trend-down" : "trend-range",
        triggerClass: triggerLong ? "trigger-long" : triggerShort ? "trigger-short" : trigger === "押し目待ち" ? "trigger-pull" : "trigger-wait",
        trendEntryClass: triggerLong ? "trend-entry-up" : triggerShort ? "trend-entry-down" : "",
        entryHeatClass: isSignal ? "entry-heat-mid" : ""
      };
    }

    function classifySetup(scanRows){
      const rows = [...scanRows].sort((a,b)=> (b.score || 0) - (a.score || 0));
      const focus = rows.slice(0, FOCUS_MAX).map((r,i)=>({ ...r, rank:i+1 }));
      const watch = rows.slice(FOCUS_MAX, FOCUS_MAX + WATCH_MAX).map((r,i)=>({ ...r, rank:i+1 }));
      const pool  = rows.slice(FOCUS_MAX + WATCH_MAX).map((r,i)=>({ ...r, rank:i+1 }));
      return { focus, watch, pool };
    }

    function formatPrice(v){
      if(v == null || !isFinite(v)) return "-";
      if(v >= 1000) return Math.round(v).toLocaleString("ja-JP");
      return v.toFixed(1);
    }

    function formatPct(v){
      if(v == null || !isFinite(v)) return "-";
      const sign = v > 0 ? "+" : "";
      return `${sign}${v.toFixed(2)}%`;
    }

    function formatVolume(v){
      if(v == null || !isFinite(v)) return "-";
      if(v >= 100000000) return `${(v/100000000).toFixed(2)}億`;
      if(v >= 10000) return `${(v/10000).toFixed(1)}万`;
      return `${Math.round(v).toLocaleString("ja-JP")}`;
    }

    function getThemes(symbol){
      return THEME_DB[symbol] || ["テーマ未設定"];
    }

    function getCompanyName(symbol){
      return COMPANY_DB[symbol] || symbol;
    }

    function buildYahooNewsUrl(symbol){
      return `https://finance.yahoo.co.jp/quote/${symbol}.T/news`;
    }

    function buildTradingViewUrl(symbol){
      return `https://jp.tradingview.com/chart/?symbol=TSE%3A${symbol}`;
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function priceClassByPct(v){
      if(v > 0) return "up";
      if(v < 0) return "down";
      return "flat";
    }

    function pickRandom(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function chunkArray(arr, size){
      const out = [];
      for(let i=0; i<arr.length; i+=size) out.push(arr.slice(i, i+size));
      return out;
    }

    async function runLimited(items, limit, worker){
      const results = [];
      let idx = 0;

      async function runner(){
        while(idx < items.length){
          const current = idx++;
          try{
            const res = await worker(items[current], current);
            if(res) results.push(res);
          }catch(e){
            console.warn("worker error", items[current], e);
          }
        }
      }

      const workers = Array.from({length:Math.min(limit, items.length || 1)}, ()=>runner());
      await Promise.all(workers);
      return results;
    }

      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return;
        const parsed = JSON.parse(raw);
        if(parsed && typeof parsed === "object"){
          STATE = {
            ...STATE,
            ...parsed,
            meta: {
              ...STATE.meta,
              ...(parsed.meta || {}),
              cache: {
                focusRows: parsed?.meta?.cache?.focusRows || [],
                watchRows: parsed?.meta?.cache?.watchRows || [],
                poolRows: parsed?.meta?.cache?.poolRows || []
              }
            }
          };
        }
      }catch(e){
        console.warn("loadState error", e);
      }
    }

    function saveState(){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
      }catch(e){
        console.warn("saveState error", e);
      }
    }

    function isMarked(symbol){
      return Array.isArray(STATE.marked) && STATE.marked.includes(symbol);

      const set = new Set(STATE.marked || []);
      if(set.has(symbol)) set.delete(symbol);

      renderAll();

      const next = (STATE.meta.tempExcluded || []).filter(s => s !== symbol);
      STATE.meta.tempExcluded = next;
      saveState();
      renderAll();
    }

    function tempExclude(symbol){

    async function scanUniverseSymbols(symbols){
  const uniqueSymbols = [...new Set(symbols)];
  const results = [];
  const failedSymbols = [];
  const total = uniqueSymbols.length;

  setAutoLoading(true, `Universe読み込み中... 0/${total}`);

  for(let i = 0; i < uniqueSymbols.length; i += SCAN_CONCURRENT){
    const chunk = uniqueSymbols.slice(i, i + SCAN_CONCURRENT);

    const chunkResults = await Promise.all(
      chunk.map(async(symbol)=>{
        try{
          const r = await analyzeScan(symbol);
          if(r){
            return {
              ok: true,
              row: {
                ...r,
                company: getCompanyName(symbol),
                themes: getThemes(symbol)
              }
            };
          }
          return { ok: false, symbol };
        }catch(e){
          console.error(symbol, e);
          return { ok: false, symbol };
        }
      })
    );

    for(const item of chunkResults){
      if(item.ok) results.push(item.row);
      else failedSymbols.push(item.symbol);
    }

    setAutoLoading(true, `Universe読み込み中... ${Math.min(i + chunk.length, total)}/${total}`);

    if(i + SCAN_CONCURRENT < uniqueSymbols.length){
      await new Promise(r => setTimeout(r, BETWEEN_CHUNK_DELAY));
    }
  }

  return { results, failedSymbols };
}

async function initAutoUniverse(){
  setAutoLoading(true, "Universe読み込み中...（PC基準で振り分け中）");
  try{
    const manualCurrent = [
      ...(STATE.focus || []),
      ...(STATE.watch || []),
      ...(STATE.pool || [])
    ];

    const universe = [...new Set([
      ...manualCurrent,
      ...SCAN_UNIVERSE
    ])];

    const { results, failedSymbols } = await scanUniverseSymbols(universe);

    STATE.scan = results.sort((a,b)=>(b.score || 0) - (a.score || 0));

    const { focus, watch, pool } = classifySetup(STATE.scan);

    const focusRows = await runLimited(focus, FOCUS_CONCURRENT, async(row, idx)=>{
      const detail = await analyzeFocus(row.symbol);
      if(!detail){
        return {
          ...row,
          rank: idx + 1,
          decision: {
            trend:"レンジ",
            trigger:"待機",
            score:row.score || 0,
            isSignal:false,
            entrySide:"WAIT",
            entryLow:row.price,
            entryHigh:row.price,

        };

    });

    const successSymbols = new Set(results.map(r => r.symbol));
    const mergedPool = [
      ...poolRows,
      ...failedSymbols
        .filter(symbol => !successSymbols.has(symbol))
        .map((symbol, idx)=>({
          symbol,
          rank: poolRows.length + idx + 1,
          price: null,
          prev: null,

        }))
    ];

    function bindInputs(){
      const searchInput = document.getElementById("searchInput");
      const symbolsInput = document.getElementById("symbolsInput");

      if(searchInput){
        searchInput.addEventListener("input", ()=>{
          const q = searchInput.value.trim();
          if(!q){
            renderAll();
            return;
          }

          const filterFn = (row)=>{
            const name = getCompanyName(row.symbol);
            const themes = getThemes(row.symbol).join(" ");
            return row.symbol.includes(q) || name.includes(q) || themes.includes(q);
          };

          const focusRows = filteredFocusRows().filter(filterFn);
          const watchRows = filteredWatchRows().filter(filterFn);
          const poolRows = filteredPoolRows().filter(filterFn);

          renderFocusTable(focusRows);
          renderWatchTable(watchRows);
          renderPoolTable(poolRows);
          renderFocusMobile(focusRows);
          renderWatchMobile(watchRows);
          renderPoolMobile(poolRows);
        });
      }

      if(symbolsInput){
        symbolsInput.addEventListener("keydown", async(e)=>{
          if(e.key !== "Enter") return;
          const raw = symbolsInput.value.trim();
          if(!raw) return;

          const symbols = raw.split(/[\s,、]+/).map(s=>s.replace(/[^0-9A-Za-z]/g,"")).filter(Boolean);
          if(!symbols.length) return;

          setAutoLoading(true, `手動入力を解析中... ${symbols.length}件`);
          try{
            const scanRows = await runLimited(symbols, SCAN_CONCURRENT, async(symbol)=>{
              const code = symbol.toUpperCase();
              const res = await analyzeScan(code);
              if(!res) return null;
              return { ...res, company:getCompanyName(code), themes:getThemes(code) };
            });

            if(scanRows.length){
              STATE.scan = scanRows.sort((a,b)=>(b.score||0)-(a.score||0));
              const { focus, watch, pool } = classifySetup(STATE.scan);

              const focusRows = await runLimited(focus, FOCUS_CONCURRENT, async(row, idx)=>{
                const detail = await analyzeFocus(row.symbol);
                return detail ? { ...row, ...detail, rank: idx+1 } : { ...row, rank: idx+1 };
              });

              const watchRows = await runLimited(watch, WATCH_CONCURRENT, async(row, idx)=>{
                const detail = await analyzeWatch(row.symbol);
                return detail ? { ...row, ...detail, rank: idx+1 } : { ...row, rank: idx+1 };
              });

              const poolRows = await runLimited(pool, POOL_CONCURRENT, async(row, idx)=>{
                const detail = await analyzePool(row.symbol);

              });

              STATE.meta.cache.focusRows = focusRows;
              STATE.meta.cache.watchRows = watchRows;
              STATE.meta.cache.poolRows = poolRows;
              STATE.focus = focusRows.map(r=>r.symbol);
              STATE.watch = watchRows.map(r=>r.symbol);
              STATE.pool = poolRows.map(r=>r.symbol);
              STATE.meta.lastFocusAt = Date.now();
              STATE.meta.lastWatchAt = Date.now();
              STATE.meta.lastPoolAt = Date.now();

              saveState();
              renderAll();
            }
          }catch(err){
            console.error(err);
          }finally{
            setAutoLoading(false);
          }
        });
      }
    }

function getDateKey(d = new Date()){
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

async function tick(){
  const now = new Date();
  const hour = now.getHours();
  const min = now.getMinutes();
  const dateKey = getDateKey(now);

  rotateMotto();

  if(hour < 9 || hour > 15) return;

  if(hour === 15 && min >= 30){
    if(TASK_GUARD.lastClosingDateKey !== dateKey){
      TASK_GUARD.lastClosingDateKey = dateKey;
      await runClosingProcess();
    }
    return;
  }

  if(min % 5 === 0 && TASK_GUARD.lastFocusMinute !== min){
    TASK_GUARD.lastFocusMinute = min;
    await runFocusTaskGuarded();
  }

  if(min % 15 === 0 && TASK_GUARD.lastWatchMinute !== min){
    TASK_GUARD.lastWatchMinute = min;
    await runWatchTaskGuarded();
  }
}

function scheduleTick(){
  tick();
  setInterval(tick, 60 * 1000);
}
