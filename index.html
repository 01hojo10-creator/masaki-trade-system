<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Masaki Trade System - Mobile Optimized</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2a;
      --panel2: #0f1726;
      --line: rgba(255,255,255,.10);
      --text: #e8eefc;
      --muted: #9fb0d1;
      --good: #19c37d;
      --bad: #ff5d73;
      --warn: #f5b942;
      --blue: #4ea1ff;
      --chip: #1a2640;
      --shadow: 0 8px 24px rgba(0,0,0,.25);
      --radius: 14px;
      --gold: #ffd54a;
      --gold-soft: rgba(255,213,74,.16);
      --focus-head: #4a3716;
      --watch-head: #133c3a;
      --pool-head: #163453;
      --card-inner: #162033;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
    }

    .wrap { max-width: 1900px; margin: 0 auto; padding: 10px; }

    /* Header & Controls */
    .header-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px; margin-bottom: 12px;
    }
    .header-inline { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .title { font-size: 20px; font-weight: 800; }
    .controls { display: flex; gap: 8px; flex: 1; justify-content: flex-end; }
    input[type="text"] {
      background: #0c1422; color: #fff; border: 1px solid var(--line);
      border-radius: 8px; padding: 8px; font-size: 14px;
    }

    /* Layout Sections */
    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin-bottom: 16px; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .section-head {
      padding: 12px; background: linear-gradient(180deg, #1a2a44, #111a2a);
      display: flex; align-items: center; justify-content: space-between;
    }
    .section-title h2 { margin: 0; font-size: 18px; display: flex; align-items: center; gap: 8px; }

    /* PC Table - Hidden on Mobile */
    .tablewrap { width: 100%; overflow-x: auto; display: block; }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th, td { padding: 10px; text-align: center; font-size: 12px; border-bottom: 1px solid var(--line); }

    /* --- MOBILE CARD UI --- */
    .mobile-card-list { display: none; padding: 10px; flex-direction: column; gap: 12px; }

    /* Focus Card Spec */
    .m-card {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }
    
    /* ENTRY Glowing Effect */
    .m-card.entry-glow {
      border: 2px solid var(--gold);
      box-shadow: 0 0 15px rgba(255, 213, 74, 0.3);
      animation: pulse-gold 2s infinite;
    }
    @keyframes pulse-gold {
      0% { box-shadow: 0 0 5px rgba(255, 213, 74, 0.2); }
      50% { box-shadow: 0 0 20px rgba(255, 213, 74, 0.5); }
      100% { box-shadow: 0 0 5px rgba(255, 213, 74, 0.2); }
    }

    .m-row-1 { display: flex; align-items: center; justify-content: space-between; }
    .m-rank-code { display: flex; align-items: center; gap: 8px; }
    .m-rank { background: var(--gold); color: #000; font-weight: 900; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .m-ticker { font-weight: 900; font-size: 16px; color: var(--gold); }
    .m-name { font-size: 14px; font-weight: 700; color: #fff; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .m-status { font-weight: 900; padding: 4px 8px; border-radius: 6px; font-size: 12px; }
    .status-entry { background: var(--good); color: #000; }
    .status-wait { background: var(--chip); color: var(--muted); }

    .m-row-2 { display: grid; grid-template-columns: 1.2fr 0.8fr 1fr; gap: 8px; align-items: center; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 8px; }
    .m-price { font-size: 18px; font-weight: 800; color: #fff; }
    .m-total { font-size: 14px; font-weight: 900; color: var(--gold); text-align: center; }
    .m-trend { font-size: 11px; font-weight: 700; text-align: right; }

    .m-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; text-align: center; font-size: 11px; }
    .m-label-val { display: flex; flex-direction: column; gap: 2px; }
    .m-label { color: var(--muted); font-size: 9px; text-transform: uppercase; }
    .m-val { font-weight: 800; color: #fff; }

    .m-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .m-tag { background: var(--chip); border: 1px solid var(--line); color: var(--warn); font-size: 10px; padding: 2px 6px; border-radius: 4px; }

    .m-footer { display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--line); pt: 8px; }
    .m-comment { font-size: 12px; color: var(--muted); line-height: 1.4; }
    .m-actions { display: flex; gap: 8px; }
    .m-btn { flex: 1; padding: 8px; border-radius: 6px; text-align: center; text-decoration: none; font-size: 12px; font-weight: 700; background: var(--chip); color: #fff; border: 1px solid var(--line); }

    /* Utility Classes */
    .up { color: var(--good); }
    .down { color: var(--bad); }

    @media (max-width: 768px) {
      .tablewrap { display: none; }
      .mobile-card-list { display: flex; }
      .header-inline { flex-direction: column; align-items: flex-start; }
      .controls { width: 100%; justify-content: space-between; }
      #searchInput { flex: 1; }
      .motto-bar { display: none; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <header class="header-panel">
    <div class="header-inline">
      <div class="title">MASAKI TRADE</div>
      <div class="controls">
        <input type="text" id="symbolsInput" placeholder="4桁">
        <input type="text" id="searchInput" placeholder="銘柄検索...">
      </div>
    </div>
  </header>

  <section class="section focus-section">
    <div class="section-head">
      <div class="section-title"><h2>🔥 FOCUS</h2></div>
      <div class="badge" id="focusCount">0</div>
    </div>
    <div class="tablewrap" id="focusTableWrap">
      <table id="focusTable">
        <thead>
          <tr><th>Rank/Ticker</th><th>Price</th><th>Total</th><th>Trend</th><th>Entry</th><th>SL/TP</th><th>Tags</th><th>Action</th></tr>
        </thead>
        <tbody id="focusBody"></tbody>
      </table>
    </div>
    <div id="focusMobileList" class="mobile-card-list"></div>
  </section>

  <section class="section watch-section">
    <div class="section-head">
      <div class="section-title"><h2>👀 WATCH</h2></div>
      <div class="badge" id="watchCount">0</div>
    </div>
    <div class="tablewrap">
      <table id="watchTable">
        <thead>
          <tr><th>Ticker/Name</th><th>Price</th><th>Score</th><th>Trend</th><th>Vol</th></tr>
        </thead>
        <tbody id="watchBody"></tbody>
      </table>
    </div>
    <div id="watchMobileList" class="mobile-card-list"></div>
  </section>

  <section class="section pool-section">
    <div class="section-head">
      <div class="section-title"><h2>📦 POOL</h2></div>
      <div class="badge" id="poolCount">0</div>
    </div>
    <div class="tablewrap">
      <table id="poolTable">
        <thead>
          <tr><th>Ticker/Name</th><th>Price</th><th>Change</th></tr>
        </thead>
        <tbody id="poolBody"></tbody>
      </table>
    </div>
    <div id="poolMobileList" class="mobile-card-list"></div>
  </section>
</div>

<script>
/**
 * UI & Logic Bridge (No logic change as per instruction)
 */

// 仮のデータ構造（実際のAPI取得処理に準拠）
let stockData = [
  { rank:1, code:"7203", name:"トヨタ自動車", price:3500, total:85, trend:"上昇", entry:"3450-3480", sl:3400, tp:3700, status:"ENTRY", tags:["円安メリット", "EV", "大型"], comment:"年初来高値更新中。押し目買い推奨。" },
  { rank:2, code:"6758", name:"ソニーG", price:13200, total:72, trend:"レンジ", entry:"13000", sl:12800, tp:14000, status:"WAIT", tags:["ゲーム", "半導体"], comment:"調整局面。13000円維持が鍵。" }
];

// メインレンダリング
function renderAll() {
  renderFocusPC();
  renderFocusMobile(); // スマホ用を呼び出し
  
  renderWatchPC();
  renderWatchMobile();

  renderPoolPC();
  renderPoolMobile();
}

/** * FOCUS Mobile Render
 */
function renderFocusMobile() {
  const container = document.getElementById('focusMobileList');
  if (!container) return;
  container.innerHTML = "";

  stockData.forEach((s, idx) => {
    const isEntry = s.status === "ENTRY";
    const card = document.createElement('div');
    card.className = `m-card ${isEntry ? 'entry-glow' : ''}`;

    card.innerHTML = `
      <div class="m-row-1">
        <div class="m-rank-code">
          <span class="m-rank">${s.rank}</span>
          <span class="m-ticker">${s.code}</span>
          <span class="m-name">${s.name}</span>
        </div>
        <div class="m-status ${isEntry ? 'status-entry' : 'status-wait'}">${s.status}</div>
      </div>

      <div class="m-row-2">
        <div class="m-price">¥${s.price.toLocaleString()}</div>
        <div class="m-total">Total: ${s.total}</div>
        <div class="m-trend ${s.trend.includes('上昇') ? 'up' : ''}">${s.trend}</div>
      </div>

      <div class="m-row-3">
        <div class="m-label-val">
          <span class="m-label">Entry帯</span>
          <span class="m-val">${s.entry}</span>
        </div>
        <div class="m-label-val">
          <span class="m-label">SL</span>
          <span class="m-val down">${s.sl}</span>
        </div>
        <div class="m-label-val">
          <span class="m-label">TP</span>
          <span class="m-val up">${s.tp}</span>
        </div>
      </div>

      <div class="m-tags">
        ${s.tags.slice(0, 3).map(t => `<span class="m-tag">${t}</span>`).join('')}
      </div>

      <div class="m-footer">
        <div class="m-comment">${s.comment}</div>
        <div class="m-actions">
          <a href="#" class="m-btn">News</a>
          <a href="#" class="m-btn">Chart</a>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
  document.getElementById('focusCount').textContent = stockData.length;
}

/** * WATCH Mobile Render
 */
function renderWatchMobile() {
  const container = document.getElementById('watchMobileList');
  if (!container) return;
  container.innerHTML = "";

  // Watchデータループ (例)
  const watchItems = stockData; // 実際は watchArray等
  watchItems.forEach(s => {
    const card = document.createElement('div');
    card.className = "m-card";
    card.innerHTML = `
      <div class="m-row-1">
        <div class="m-rank-code">
          <span class="m-ticker">${s.code}</span>
          <span class="m-name">${s.name}</span>
        </div>
      </div>
      <div class="m-row-2">
        <div class="m-price">¥${s.price.toLocaleString()}</div>
        <div class="m-total">Score: ${s.total}</div>
        <div class="m-trend">Vol: 1.2M</div>
      </div>
      <div class="m-tags">
        ${s.tags.slice(0, 2).map(t => `<span class="m-tag">${t}</span>`).join('')}
      </div>
      <div class="m-footer">
        <div class="m-actions">
          <a href="#" class="m-btn">News</a>
          <a href="#" class="m-btn">Chart</a>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
  document.getElementById('watchCount').textContent = watchItems.length;
}

/** * POOL Mobile Render
 */
function renderPoolMobile() {
  const container = document.getElementById('poolMobileList');
  if (!container) return;
  container.innerHTML = "";

  const poolItems = stockData; // 実際は poolArray等
  poolItems.forEach(s => {
    const card = document.createElement('div');
    card.className = "m-card";
    card.innerHTML = `
      <div class="m-row-1">
        <div class="m-rank-code">
          <span class="m-ticker">${s.code}</span>
          <span class="m-name">${s.name}</span>
        </div>
        <div class="m-price" style="font-size:14px">¥${s.price.toLocaleString()}</div>
      </div>
      <div class="m-row-2" style="grid-template-columns: 1fr 1fr">
        <div class="m-trend up">+1.25%</div>
        <div class="m-tags" style="justify-content: flex-end">
          ${s.tags.slice(0,1).map(t => `<span class="m-tag">${t}</span>`).join('')}
        </div>
      </div>
      <div class="m-footer">
        <div class="m-actions">
          <a href="#" class="m-btn">News</a>
          <a href="#" class="m-btn">Chart</a>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
  document.getElementById('poolCount').textContent = poolItems.length;
}

// PC版の描画（既存ロジックをシミュレート）
function renderFocusPC() {
  const body = document.getElementById('focusBody');
  body.innerHTML = stockData.map(s => `
    <tr>
      <td>${s.rank} / ${s.code} <br> ${s.name}</td>
      <td>${s.price}</td>
      <td>${s.total}</td>
      <td>${s.trend}</td>
      <td>${s.entry}</td>
      <td>SL:${s.sl}<br>TP:${s.tp}</td>
      <td>${s.tags.join(', ')}</td>
      <td><button>Detail</button></td>
    </tr>
  `).join('');
}
function renderWatchPC() {} // 略
function renderPoolPC() {} // 略

// 初期実行
window.onload = renderAll;
</script>

</body>
</html>
